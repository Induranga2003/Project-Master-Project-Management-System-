version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: project-management-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - project-network

  # Backend Service
  backend:
    build:
      context: ./project managment system/backend
      dockerfile: Dockerfile
    container_name: project-management-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/project-management?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - FRONTEND_URL=http://localhost:3001
      - PORT=5001
    depends_on:
      - mongodb
    networks:
      - project-network
    volumes:
      - ./project managment system/backend:/app
      - /app/node_modules

  # Frontend Service
  frontend:
    build:
      context: ./project managment system/frontend
      dockerfile: Dockerfile
    container_name: project-management-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5001
    depends_on:
      - backend
    networks:
      - project-network
    # Note: REACT_APP_API_URL should point to localhost:5001 for browser access
    # The browser makes requests, not the container

volumes:
  mongodb_data:
    driver: local

networks:
  project-network:
    driver: bridge
